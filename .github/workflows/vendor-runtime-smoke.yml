name: Vendor Runtime Smoke

on:
  workflow_dispatch:

jobs:
  vendor-runtime-smoke:
    if: ${{ runner.os == 'macOS' }}
    runs-on: macos-latest
    env:
      HLA2010_ENABLE_REAL_RTI_SMOKE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Install vendor smoke environment
        env:
          HLA2010_BOOTSTRAP_EXTRAS: test,jpype,py4j
        run: ./scripts/ci/install_python.sh
      - name: Run explicit vendor-green smoke tests
        run: ./scripts/ci/vendor_green.sh all
