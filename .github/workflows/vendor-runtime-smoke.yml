name: Vendor Runtime Smoke

on:
  workflow_dispatch:

jobs:
  vendor-runtime-smoke:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: all
            command: ./scripts/ci/vendor_green.sh all
            ci_profile: all
          - name: certi-save-restore-probe
            command: ./tools/certi-easy save-restore-probe
            ci_profile: certi
          - name: certi-ddm-probe
            command: ./tools/certi-easy ddm-probe
            ci_profile: certi
          - name: pitch-save-restore-probe
            command: ./tools/pitch save-restore-probe
            ci_profile: pitch
          - name: pitch-ddm-probe
            command: ./tools/pitch ddm-probe
            ci_profile: pitch
          - name: pitch-negotiated-probe
            command: ./tools/pitch negotiated-probe
            ci_profile: pitch
          - name: pitch-time-window-probe
            command: ./tools/pitch time-window-probe
            ci_profile: pitch
          - name: pitch-time-window-restore-state-probe
            command: ./tools/pitch time-window-restore-state-probe
            ci_profile: pitch
          - name: pitch-lost-federate-probe
            command: ./tools/pitch lost-federate-probe
            ci_profile: pitch
    env:
      HLA2010_ENABLE_REAL_RTI_SMOKE: "1"
      HLA2010_CERTI_PATCHED_PREFIX: ${{ vars.HLA2010_CERTI_PATCHED_PREFIX }}
      HLA2010_CERTI_PATCHED_BUILD_ROOT: ${{ vars.HLA2010_CERTI_PATCHED_BUILD_ROOT }}
      HLA2010_CERTI_PREFIX: ${{ vars.HLA2010_CERTI_PATCHED_PREFIX }}
      HLA2010_CERTI_BUILD_ROOT: ${{ vars.HLA2010_CERTI_PATCHED_BUILD_ROOT }}
      HLA2010_PITCH_HOME: ${{ vars.HLA2010_PITCH_HOME }}
      HLA2010_PITCH_USER_HOME: ${{ vars.HLA2010_PITCH_USER_HOME }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Install vendor smoke environment
        env:
          HLA2010_BOOTSTRAP_EXTRAS: test,jpype,py4j
        run: ./scripts/ci/install_python.sh
      - name: Validate vendor smoke runtime state
        run: python3 scripts/ci/check_vendor_runtime_ci_state.py --profile ${{ matrix.ci_profile }}
      - name: Run explicit vendor-green smoke tests
        run: ${{ matrix.command }}
      - name: Publish vendor smoke runtime-state summary
        if: always()
        run: cat analysis/vendor_runtime_ci_state/${{ matrix.ci_profile }}/vendor_runtime_ci_state_report.md >> "$GITHUB_STEP_SUMMARY"
      - name: Publish vendor runtime summary
        if: always()
        run: python3 scripts/ci/write_vendor_runtime_job_summary.py --output "$GITHUB_STEP_SUMMARY"
      - name: Upload vendor runtime smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vendor-runtime-smoke-${{ matrix.name }}-artifacts
          path: |
            analysis/preflight_artifacts/
            analysis/vendor_runtime_ci_state/
            analysis/vendor_runtime_status/
            analysis/vendor_parity_artifacts/
          if-no-files-found: ignore
          retention-days: 14
