name: Vendor Runtime Smoke

on:
  workflow_dispatch:

jobs:
  vendor-runtime-smoke:
    if: ${{ runner.os == 'macOS' }}
    runs-on: macos-latest
    env:
      HLA2010_ENABLE_REAL_RTI_SMOKE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[test,jpype,py4j]'
      - name: Verify vendor runtime inputs are present
        run: |
          test -n "${HLA2010_PITCH_HOME:-}" || { echo "HLA2010_PITCH_HOME is required"; exit 1; }
          test -n "${HLA2010_CERTI_PREFIX:-}" || { echo "HLA2010_CERTI_PREFIX is required"; exit 1; }
      - name: Run explicit vendor smoke tests
        run: python -m pytest -q tests/test_real_vendor_runtime_smoke.py
