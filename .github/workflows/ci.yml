name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  seed-suite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[test]'
      - name: Run seed suite
        run: python -m pytest -q

  optional-java-bridges:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Install optional bridge dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[test,jpype,py4j]'
      - name: Run optional bridge checks
        run: python -m pytest -q tests/test_optional_real_java_bridges.py

  certi-runtime-required:
    runs-on: macos-latest
    env:
      HLA2010_ENABLE_REAL_RTI_SMOKE: "1"
      HLA2010_CERTI_PREFIX: ${{ vars.HLA2010_CERTI_PREFIX }}
      HLA2010_CERTI_BUILD_ROOT: ${{ vars.HLA2010_CERTI_BUILD_ROOT }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Install CERTI smoke dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[test,jpype,py4j]'
      - name: Verify CERTI runtime inputs are present
        run: |
          test -n "${HLA2010_CERTI_PREFIX:-}" || { echo "HLA2010_CERTI_PREFIX is required for required CERTI smoke"; exit 1; }
      - name: Run required CERTI runtime profile
        run: |
          python -m pytest -q tests/test_real_vendor_runtime_smoke.py -k 'certi'
          python -m pytest -q tests/test_certi_real_backend_matrix.py
