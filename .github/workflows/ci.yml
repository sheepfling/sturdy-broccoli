name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  seed-suite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[test]'
      - name: Run seed suite
        run: python -m pytest -q

  optional-java-bridges:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Install optional bridge dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[test,jpype,py4j]'
      - name: Run optional bridge checks
        run: python -m pytest -q tests/test_optional_real_java_bridges.py
