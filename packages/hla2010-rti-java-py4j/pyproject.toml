[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "hla2010-rti-java-py4j"
version = "0.13.0"
description = "Generic Py4J Java RTI bridge package for hla2010-spec"
readme = "README.md"
requires-python = ">=3.10"
dependencies = ["hla2010-spec==0.13.0", "hla2010-rti-java-common==0.13.0", "py4j"]

[project.optional-dependencies]
test = ["pytest"]

[project.entry-points."hla.rti_backends"]
py4j = "hla2010_rti_java_py4j.plugin:plugin"

[project.entry-points."hla2010.rti_backends"]
py4j = "hla2010_rti_java_py4j.plugin:plugin"

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]
include = ["hla2010_rti_java_py4j*"]

[tool.hla2010.package-split]
status = "implementation-moved"
role = "java-bridge"
backend_names = ["py4j"]
backend_aliases = ["java-py4j"]
source_roots = [
  "packages/hla2010-rti-java-py4j/src/hla2010_rti_java_py4j",
]

[tool.hla.package-split]
status = "implementation-moved"
role = "java-bridge"
backend_names = ["py4j"]
backend_aliases = ["java-py4j"]
source_roots = [
  "packages/hla2010-rti-java-py4j/src/hla2010_rti_java_py4j",
]
