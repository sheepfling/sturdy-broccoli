[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "hla-vendor-pitch-py4j"
version = "0.13.0"
description = "Pitch Java RTI Py4J backend plugin for hla-rti1516e"
readme = "README.md"
requires-python = ">=3.10"
dependencies = ["hla-rti1516e==0.13.0", "hla-rti-core==0.13.0", "hla-bridge-java-common==0.13.0", "hla-bridge-java-py4j==0.13.0", "hla-vendor-pitch==0.13.0", "hla-backend-python2025==0.13.0"]

[project.optional-dependencies]
test = ["pytest"]

[project.entry-points."hla.rti_backends"]
pitch-py4j = "hla.vendors.pitch.py4j.plugin:plugin"
pitch-202x-py4j = "hla.vendors.pitch.py4j.plugin:pitch_202x_plugin"

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]
include = ["hla.vendors.pitch.py4j*"]
namespaces = true

[tool.hla.package]
status = "implementation-moved"
role = "rti-backend"
backend_names = ["pitch-py4j", "pitch-202x-py4j"]
backend_aliases = ["java-pitch-py4j", "java-pitch-202x-py4j"]
source_roots = [
  "packages/hla-vendor-pitch-py4j/src/hla/vendors/pitch/py4j",
]
