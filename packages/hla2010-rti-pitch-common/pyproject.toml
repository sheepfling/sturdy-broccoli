[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "hla2010-rti-pitch-common"
version = "0.13.0"
description = "Shared Pitch runtime discovery and launch helpers for hla2010 RTI plugins"
readme = "README.md"
requires-python = ">=3.10"
dependencies = ["hla2010-spec==0.13.0", "hla2010-rti-runtime-common==0.13.0"]

[project.optional-dependencies]
test = ["pytest"]

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]
include = ["hla2010_rti_pitch_common*"]

[tool.hla2010.package-split]
status = "implementation-moved"
role = "runtime-common"
source_roots = [
  "packages/hla2010-rti-pitch-common/src/hla2010_rti_pitch_common",
  "hla2010/real_rti_pitch.py",
]
