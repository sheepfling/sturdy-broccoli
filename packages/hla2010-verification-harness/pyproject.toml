[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "hla2010-verification-harness"
version = "0.13.0"
description = "Supported public verification harness helpers for hla2010"
readme = "README.md"
requires-python = ">=3.10"
dependencies = ["hla2010-spec==0.13.0"]

[project.optional-dependencies]
test = ["pytest"]

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]
include = ["hla2010_verification_harness*"]

[tool.hla2010.package-split]
status = "implementation-moved"
role = "verification-harness"
source_roots = [
  "packages/hla2010-verification-harness/src/hla2010_verification_harness/scenario_support.py",
  "packages/hla2010-verification-harness/src/hla2010_verification_harness/scenario_basic.py",
  "packages/hla2010-verification-harness/src/hla2010_verification_harness/scenario_exchange.py",
  "packages/hla2010-verification-harness/src/hla2010_verification_harness/scenario_exchange_history.py",
  "packages/hla2010-verification-harness/src/hla2010_verification_harness/scenario_sync.py",
  "packages/hla2010-verification-harness/src/hla2010_verification_harness/scenario_ownership.py",
  "packages/hla2010-verification-harness/src/hla2010_verification_harness/two_federate_suite_pairs.py",
  "packages/hla2010-verification-harness/src/hla2010_verification_harness/two_federate_suite_configs.py",
  "packages/hla2010-verification-harness/src/hla2010_verification_harness/two_federate_suite_scenarios.py",
  "packages/hla2010-verification-harness/src/hla2010_verification_harness/two_federate_suite_types.py",
  "packages/hla2010-verification-harness/src/hla2010_verification_harness/two_federate_suite_timeline.py",
  "packages/hla2010-verification-harness/src/hla2010_verification_harness/two_federate_suite_summary.py",
  "packages/hla2010-verification-harness/src/hla2010_verification_harness/two_federate_suite_writers.py",
  "packages/hla2010-verification-harness/src/hla2010_verification_harness/section8_matrix.py",
]
