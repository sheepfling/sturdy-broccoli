[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "hla2010-verification-harness"
version = "0.13.0"
description = "Supported public verification harness helpers for hla2010"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "hla2010-spec==0.13.0",
  "hla2010-rti-backend-common==0.13.0",
  "hla2010-rti-runtime-common==0.13.0",
]

[project.optional-dependencies]
test = ["pytest"]

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]
include = ["hla2010_verification_harness*"]

[tool.hla2010.package-split]
status = "implementation-moved"
role = "verification-harness"
source_roots = [
  "packages/hla2010-verification-harness/src/hla2010_verification_harness",
]
