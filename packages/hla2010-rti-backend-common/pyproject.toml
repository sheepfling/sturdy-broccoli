[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "hla2010-rti-backend-common"
version = "0.13.0"
description = "Shared backend conversion support package for hla2010-spec"
readme = "README.md"
requires-python = ">=3.10"
dependencies = ["hla2010-spec==0.13.0"]

[project.optional-dependencies]
test = ["pytest"]

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]
include = ["hla2010_rti_backend_common*"]

[tool.hla2010.package-split]
status = "implementation-moved"
role = "backend-support"
source_roots = [
  "packages/hla2010-rti-backend-common/src/hla2010_rti_backend_common",
]

[tool.hla.package-split]
status = "implementation-moved"
role = "backend-support"
source_roots = [
  "packages/hla2010-rti-backend-common/src/hla2010_rti_backend_common",
]
