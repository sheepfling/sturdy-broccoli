[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "hla2010-spec"
version = "0.13.0"
description = "Abstract Python API and backend plugin contract for IEEE 1516.1-2010 HLA"
readme = "README.md"
requires-python = ">=3.10"

[project.optional-dependencies]
lint = ["ruff>=0.5"]
typecheck = ["pyright>=1.1.408"]
test = ["pytest"]

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]
include = ["hla2010*"]
exclude = ["hla2010.testing*", "hla2010_repo_internal*"]

[tool.setuptools.package-data]
hla2010 = ["resources/foms/*.xml"]

[tool.hla2010.package-split]
status = "implementation-owned"
role = "core-spec"
source_roots = [
  "packages/hla2010-spec/src/hla2010",
]
