[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "hla2010-spec"
version = "0.13.0"
description = "Abstract Python API and backend plugin contract for IEEE 1516.1-2010 HLA"
readme = "README.md"
requires-python = ">=3.10"

[project.optional-dependencies]
lint = ["ruff>=0.5"]
typecheck = ["pyright>=1.1.408"]
test = ["pytest"]

[tool.hla2010.package-split]
status = "migration-scaffold"
role = "core-spec"
source_roots = [
  "hla2010/spec",
  "hla2010/runtime_api.py",
  "hla2010/backends/base.py",
  "hla2010/rti.py",
]
