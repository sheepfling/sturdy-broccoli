[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "hla-vendor-pitch"
version = "0.13.0"
description = "Shared Pitch runtime discovery and launch helpers for hla2010 RTI plugins"
readme = "README.md"
requires-python = ">=3.10"
dependencies = ["hla-rti1516e==0.13.0", "hla-bridge-java-common==0.13.0", "hla-rti-core==0.13.0"]

[project.optional-dependencies]
test = ["pytest"]

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]
include = ["hla.vendors.pitch*"]
namespaces = true

[tool.hla.package]
status = "implementation-moved"
role = "runtime-common"
source_roots = [
  "packages/hla-vendor-pitch/src/hla/vendors/pitch",
]
