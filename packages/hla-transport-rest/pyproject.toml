[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "hla-transport-rest"
version = "0.13.0"
description = "REST transport package for hla2010 RTI backend adapters"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "hla-rti1516e==0.13.0",
  "hla-backend-common==0.13.0",
  "hla-transport-common==0.13.0",
  "hla-rti-core==0.13.0",
]

[project.optional-dependencies]
test = ["pytest"]

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]
include = ["hla.transports.rest*"]
namespaces = true

[tool.hla.package]
status = "implementation-moved"
role = "transport"
transport_names = ["rest", "http-json"]
source_roots = [
  "packages/hla-transport-rest/src/hla/transports/rest",
]
