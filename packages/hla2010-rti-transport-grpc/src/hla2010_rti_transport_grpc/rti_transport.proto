syntax = "proto3";

package hla2010.backends.grpc_transport;

import "google/protobuf/struct.proto";

message TransportList {
  repeated TransportValue values = 1;
}

message TransportStruct {
  map<string, TransportValue> fields = 1;
}

message TransportValue {
  oneof kind {
    google.protobuf.NullValue null_value = 1;
    bool bool_value = 2;
    int64 int64_value = 3;
    double double_value = 4;
    string string_value = 5;
    bytes bytes_value = 6;
    TransportList list_value = 7;
    TransportStruct struct_value = 8;
  }
}

message TransportRequest {
  string command = 1;
  repeated TransportValue fields = 2;
  TransportStruct metadata = 3;
}

message TransportError {
  string code = 1;
  string message = 2;
  TransportStruct metadata = 3;
}

message TransportResponse {
  repeated TransportValue fields = 1;
  TransportStruct metadata = 2;
  TransportError error = 3;
}

service RTITransportService {
  rpc Request(TransportRequest) returns (TransportResponse);
}
