[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "hla2010-rti-transport-grpc"
version = "0.13.0"
description = "gRPC transport package for hla2010 RTI backend adapters"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "hla2010-spec==0.13.0",
  "hla2010-rti-backend-common==0.13.0",
  "hla2010-rti-transport-common==0.13.0",
  "hla2010-rti-runtime-common==0.13.0",
  "grpcio",
]

[project.optional-dependencies]
test = ["pytest"]

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]
include = ["hla2010_rti_transport_grpc*"]

[tool.setuptools.package-data]
hla2010_rti_transport_grpc = ["*.proto"]

[tool.hla2010.package-split]
status = "implementation-moved"
role = "transport"
transport_names = ["grpc"]
source_roots = [
  "packages/hla2010-rti-transport-grpc/src/hla2010_rti_transport_grpc",
]
