[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "hla2010-rti-python"
version = "0.13.0"
description = "Pure in-memory Python RTI backend plugin for hla2010-spec"
readme = "README.md"
requires-python = ">=3.10"
dependencies = ["hla2010-spec==0.13.0", "hla2010-rti-java-common==0.13.0"]

[project.optional-dependencies]
lint = ["ruff>=0.5"]
typecheck = ["pyright>=1.1.408"]
test = ["pytest"]

[project.entry-points."hla2010.rti_backends"]
python = "hla2010_rti_python.plugin:plugin"

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]
include = ["hla2010_rti_python*"]

[tool.hla2010.package-split]
status = "implementation-moved"
role = "rti-backend"
backend_names = ["python"]
backend_aliases = ["inmemory", "in-memory", "python-inmemory", "python-in-memory"]
source_roots = [
  "packages/hla2010-rti-python/src/hla2010_rti_python",
  "hla2010/backends/python",
]
