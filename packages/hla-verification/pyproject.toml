[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "hla-verification"
version = "0.13.0"
description = "Supported public verification harness helpers for hla2010"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "hla-rti1516e==0.13.0",
  "hla-rti1516-2025==0.13.0",
  "hla-backend-common==0.13.0",
  "hla-backend-inmemory==0.13.0",
  "hla-fom-target-radar==0.13.0",
  "hla-fom-hlax-message-test==0.13.0",
  "hla-fom-hlax-space-lite==0.13.0",
  "hla-fom-hlax-time-mgmt-test==0.13.0",
  "hla-rti-core==0.13.0",
  "hla-backend-cpp-shim==0.13.0",
  "hla-bridge-java-common==0.13.0",
  "PyYAML",
]

[project.optional-dependencies]
test = ["pytest"]

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]
include = ["hla.verification*"]
namespaces = true

[tool.hla.package]
status = "implementation-moved"
role = "verification-harness"
source_roots = [
  "packages/hla-verification/src/hla/verification",
]
