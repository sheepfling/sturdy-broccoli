[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "hla-backend-python2025"
version = "0.13.0"
description = "Main full Python RTI backend package for HLA 1516.1-2025"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "hla-backend-common==0.13.0",
  "hla-rti-core==0.13.0",
  "hla-rti1516-2025==0.13.0",
  "hla-transport-common==0.13.0",
]

[project.optional-dependencies]
test = ["pytest"]

[project.entry-points."hla.rti_backends"]
python1516_2025 = "hla.backends.python2025.plugin:plugin"

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]
include = ["hla.backends.python2025*"]
namespaces = true

[tool.hla.package]
status = "implementation-owned"
role = "rti-backend"
backend_names = ["python1516_2025"]
backend_aliases = ["python-1516-2025"]
source_roots = [
  "packages/hla-backend-python2025/src/hla/backends/python2025",
]
