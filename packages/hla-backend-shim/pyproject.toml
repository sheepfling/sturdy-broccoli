[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "hla-backend-shim"
version = "0.13.0"
description = "Temporary import-compatibility scaffolding package for the main full Python 2025 RTI"
readme = "README.md"
requires-python = ">=3.11"
dependencies = ["hla-backend-python2025==0.13.0", "hla-rti-core==0.13.0", "hla-rti1516-2025==0.13.0"]

[project.optional-dependencies]
test = ["pytest"]

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]
include = ["hla.backends.shim*"]
namespaces = true

[tool.hla.package]
status = "compatibility-maintained"
role = "compatibility-wrapper"
backend_names = []
backend_aliases = []
source_roots = [
  "packages/hla-backend-shim/src/hla/backends/shim",
]
