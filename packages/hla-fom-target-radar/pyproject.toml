[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "hla-fom-target-radar"
version = "0.13.0"
description = "Target/Radar FOM resources and scenario helpers for hla-rti1516e"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "hla-rti1516e==0.13.0",
  "hla-rti1516-2025==0.13.0",
  "hla-rti-core==0.13.0",
]

[project.optional-dependencies]
python-rti = ["hla-backend-python1516e==0.13.0"]
certi = ["hla-backend-certi==0.13.0"]
pitch = ["hla-vendor-pitch-jpype==0.13.0", "hla-vendor-pitch-py4j==0.13.0"]
test = ["pytest"]

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]
include = ["hla.foms.target_radar*"]
namespaces = true

[tool.setuptools.package-data]
"hla.foms.target_radar" = ["resources/foms/*.xml"]

[tool.hla.package]
status = "implementation-moved"
role = "fom-example"
source_roots = [
  "packages/hla-fom-target-radar/src/hla/foms/target_radar",
]
