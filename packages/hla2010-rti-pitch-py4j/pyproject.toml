[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "hla2010-rti-pitch-py4j"
version = "0.13.0"
description = "Pitch Java RTI Py4J backend plugin for hla2010-spec"
readme = "README.md"
requires-python = ">=3.10"
dependencies = ["hla2010-spec==0.13.0", "hla2010-rti-java-py4j==0.13.0", "hla2010-rti-pitch-common==0.13.0"]

[project.optional-dependencies]
test = ["pytest"]

[project.entry-points."hla2010.rti_backends"]
pitch-py4j = "hla2010_rti_pitch_py4j.plugin:plugin"

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]
include = ["hla2010_rti_pitch_py4j*"]

[tool.hla2010.package-split]
status = "implementation-moved"
role = "rti-backend"
backend_names = ["pitch-py4j"]
backend_aliases = ["java-pitch-py4j"]
source_roots = [
  "packages/hla2010-rti-pitch-py4j/src/hla2010_rti_pitch_py4j",
]
