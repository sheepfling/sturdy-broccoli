[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "hla-bridge-java-jpype"
version = "0.13.0"
description = "Generic JPype Java RTI bridge package for hla-rti1516e"
readme = "README.md"
requires-python = ">=3.10"
dependencies = ["hla-rti1516e==0.13.0", "hla-rti-core==0.13.0", "hla-backend-common==0.13.0", "hla-bridge-java-common==0.13.0", "jpype1"]

[project.optional-dependencies]
test = ["pytest"]

[project.entry-points."hla.rti_backends"]
jpype = "hla.bridges.java.jpype.plugin:plugin"

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]
include = ["hla.bridges.java.jpype*"]
namespaces = true

[tool.hla.package]
status = "implementation-moved"
role = "java-bridge"
backend_names = ["jpype"]
backend_aliases = ["java-jpype"]
source_roots = [
  "packages/hla-bridge-java-jpype/src/hla/bridges/java/jpype",
]
