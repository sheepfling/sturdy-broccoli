[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "hla-bridge-java-py4j"
version = "0.13.0"
description = "Generic Py4J Java RTI bridge package for hla-rti1516e"
readme = "README.md"
requires-python = ">=3.10"
dependencies = ["hla-rti1516e==0.13.0", "hla-rti-core==0.13.0", "hla-backend-common==0.13.0", "hla-bridge-java-common==0.13.0", "py4j"]

[project.optional-dependencies]
test = ["pytest"]

[project.entry-points."hla.rti_backends"]
py4j = "hla.bridges.java.py4j.plugin:plugin"

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]
include = ["hla.bridges.java.py4j*"]
namespaces = true

[tool.hla.package]
status = "implementation-moved"
role = "java-bridge"
backend_names = ["py4j"]
backend_aliases = ["java-py4j"]
source_roots = [
  "packages/hla-bridge-java-py4j/src/hla/bridges/java/py4j",
]
