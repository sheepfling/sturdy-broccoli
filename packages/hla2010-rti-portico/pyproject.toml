[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "hla2010-rti-portico"
version = "0.13.0"
description = "Portico RTI backend plugins for hla2010-spec"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "hla2010-spec==0.13.0",
  "hla2010-rti-java-jpype==0.13.0",
  "hla2010-rti-java-py4j==0.13.0",
]

[project.optional-dependencies]
test = ["pytest"]

[project.entry-points."hla2010.rti_backends"]
portico-jpype = "hla2010_rti_portico.plugin:portico_jpype_plugin"
portico-py4j = "hla2010_rti_portico.plugin:portico_py4j_plugin"

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]
include = ["hla2010_rti_portico*"]

[tool.hla2010.package-split]
status = "implementation-moved"
role = "rti-backend"
backend_names = ["portico-jpype", "portico-py4j"]
backend_aliases = ["portico", "java-portico-jpype", "java-portico-py4j"]
source_roots = [
  "packages/hla2010-rti-portico/src/hla2010_rti_portico",
]
