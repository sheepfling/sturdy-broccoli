[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "hla-backend-inmemory"
version = "0.13.0"
description = "Pure in-memory Python RTI backend plugin for hla-rti1516e"
readme = "README.md"
requires-python = ">=3.10"
dependencies = ["hla-rti1516e==0.13.0", "hla-rti-core==0.13.0", "hla-backend-common==0.13.0"]

[project.optional-dependencies]
lint = ["ruff>=0.5"]
typecheck = ["pyright>=1.1.408"]
test = ["pytest"]

[project.entry-points."hla.rti_backends"]
inmemory = "hla.backends.inmemory.plugin:plugin"

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]
include = ["hla.backends.inmemory*"]
namespaces = true

[tool.hla.package]
status = "implementation-moved"
role = "rti-backend"
backend_names = ["inmemory"]
backend_aliases = ["python", "in-memory", "python-inmemory", "python-in-memory"]
source_roots = [
  "packages/hla-backend-inmemory/src/hla/backends/inmemory",
]
