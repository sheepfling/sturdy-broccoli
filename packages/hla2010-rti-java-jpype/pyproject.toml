[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "hla2010-rti-java-jpype"
version = "0.13.0"
description = "Generic JPype Java RTI bridge package for hla2010-spec"
readme = "README.md"
requires-python = ">=3.10"
dependencies = ["hla2010-spec==0.13.0", "hla2010-rti-backend-common==0.13.0", "hla2010-rti-java-common==0.13.0", "jpype1"]

[project.optional-dependencies]
test = ["pytest"]

[project.entry-points."hla2010.rti_backends"]
jpype = "hla2010_rti_java_jpype.plugin:plugin"

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]
include = ["hla2010_rti_java_jpype*"]

[tool.hla2010.package-split]
status = "implementation-moved"
role = "java-bridge"
backend_names = ["jpype"]
backend_aliases = ["java-jpype"]
source_roots = [
  "packages/hla2010-rti-java-jpype/src/hla2010_rti_java_jpype",
]
