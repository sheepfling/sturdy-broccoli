   Non-normative invented protobuf model for the IEEE 1516.1(TM)-2010
   High Level Architecture Interface Specification.

   This file is a derivative engineering model created from the public
   2010 Java API/WSDL artifacts and the 2025 FedPro protobuf style. It is
   not an IEEE-published standard and is not wire-compatible with the 2025
   FedPro package.

   Attribution retained for derivative use of IEEE materials:
