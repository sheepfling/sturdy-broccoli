[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "hla-transport-common"
version = "0.13.0"
description = "Shared hosted transport request-processing helpers for hla2010"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "hla-rti1516e==0.13.0",
  "hla-backend-common==0.13.0",
]

[project.optional-dependencies]
test = ["pytest"]

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]
include = ["hla.transports.common*"]
namespaces = true

[tool.hla.package]
status = "implementation-moved"
role = "transport-support"
source_roots = [
  "packages/hla-transport-common/src/hla/transports/common",
]
