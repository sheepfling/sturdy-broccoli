[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "hla-rti-core"
version = "0.13.0"
description = "Shared HLA runtime, FOM, and spec support helpers"
readme = "README.md"
requires-python = ">=3.10"
dependencies = []

[project.optional-dependencies]
test = ["pytest"]

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]
include = ["hla.rti*", "hla.runtime*", "hla.fom*", "hla.spec*"]
namespaces = true

[tool.setuptools.package-data]
"hla.runtime" = ["py.typed"]
"hla.fom" = ["py.typed", "resources/foms/*.xml", "resources/proto2025/foms/*.xml", "resources/proto2025/encoding_auth/*.xml"]
"hla.spec" = ["py.typed"]

[tool.hla.package]
status = "implementation-moved"
role = "runtime-support"
source_roots = [
  "packages/hla-rti-core/src/hla/rti",
  "packages/hla-rti-core/src/hla/runtime",
  "packages/hla-rti-core/src/hla/fom",
  "packages/hla-rti-core/src/hla/spec",
]
