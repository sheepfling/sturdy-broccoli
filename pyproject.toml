# Root pyproject is intentionally tooling-only. Installable distributions live
# under packages/*, with packages/hla-rti1516e owning src/hla.rti1516e.

[tool.pytest.ini_options]
# Pytest mirrors the workspace package roots so source-checkout runs resolve the
# same split packages that editable installs expose.
pythonpath = [
  "packages/hla-rti1516e/src",
  "packages/hla-rti1516-2025/src",
  "packages/hla-backend-python1516e/src",
  "packages/hla-backend-python1516-2025/src",
  "packages/hla-backend-cpp-shim/src",
  "packages/hla-backend-shim/src",
  "packages/hla-backend-certi/src",
  "packages/hla-backend-common/src",
  "packages/hla-bridge-java-common/src",
  "packages/hla-rti-core/src",
  "packages/hla-bridge-java-jpype/src",
  "packages/hla-bridge-java-py4j/src",
  "packages/hla-vendor-pitch/src",
  "packages/hla-vendor-pitch-jpype/src",
  "packages/hla-vendor-pitch-py4j/src",
  "packages/hla-vendor-portico/src",
  "packages/hla-transport-common/src",
  "packages/hla-transport-grpc/src",
  "packages/hla-transport-rest/src",
  "packages/hla-fom-target-radar/src",
  "packages/hla-fom-proto2025-message-test/src",
  "packages/hla-fom-proto2025-space-lite/src",
  "packages/hla-fom-proto2025-time-mgmt-test/src",
  "packages/hla-verification/src",
]
testpaths = ["tests"]

[tool.ruff]
line-length = 160
target-version = "py310"
extend-exclude = [
  "CERTI",
  "archives",
  "INBOX",
  "docs/evidence",
  "third_party/pitch",
  "tools",
]

[tool.ruff.lint]
select = ["E", "F", "I"]
per-file-ignores = { "tests/vendors/*.py" = ["F401", "F403", "F405", "I001"] }
