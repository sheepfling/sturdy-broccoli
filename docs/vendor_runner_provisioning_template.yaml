version: 1

profiles:
  certi:
    description: Patched CERTI-only dedicated runner state.
    required_vars:
      - HLA2010_CERTI_PATCHED_PREFIX
      - HLA2010_CERTI_PATCHED_BUILD_ROOT
    compatibility_vars:
      HLA2010_CERTI_PREFIX: HLA2010_CERTI_PATCHED_PREFIX
      HLA2010_CERTI_BUILD_ROOT: HLA2010_CERTI_PATCHED_BUILD_ROOT
    required_markers:
      - ${HLA2010_CERTI_PATCHED_PREFIX}/bin/rtig
      - ${HLA2010_CERTI_PATCHED_BUILD_ROOT}/libRTI/ieee1516-2010
    validate:
      - python3 scripts/ci/check_vendor_runtime_ci_state.py --profile certi --json
      - ./tools/certi-easy preflight

  pitch:
    description: Pitch-only Docker-backed dedicated runner state.
    required_vars:
      - HLA2010_PITCH_HOME
      - HLA2010_PITCH_USER_HOME
    required_markers:
      - ${HLA2010_PITCH_HOME}/lib/prtifull.jar
    validate:
      - python3 scripts/ci/check_vendor_runtime_ci_state.py --profile pitch --json
      - ./tools/pitch preflight

  matrix:
    description: Patched + upstream CERTI plus Pitch dedicated runner state.
    required_vars:
      - HLA2010_CERTI_PATCHED_PREFIX
      - HLA2010_CERTI_PATCHED_BUILD_ROOT
      - HLA2010_CERTI_UPSTREAM_PREFIX
      - HLA2010_CERTI_UPSTREAM_BUILD_ROOT
      - HLA2010_PITCH_HOME
      - HLA2010_PITCH_USER_HOME
    compatibility_vars:
      HLA2010_CERTI_PREFIX: HLA2010_CERTI_PATCHED_PREFIX
      HLA2010_CERTI_BUILD_ROOT: HLA2010_CERTI_PATCHED_BUILD_ROOT
    required_markers:
      - ${HLA2010_CERTI_PATCHED_PREFIX}/bin/rtig
      - ${HLA2010_CERTI_PATCHED_BUILD_ROOT}/libRTI/ieee1516-2010
      - ${HLA2010_CERTI_UPSTREAM_PREFIX}/bin/rtig
      - ${HLA2010_CERTI_UPSTREAM_BUILD_ROOT}/libRTI/ieee1516-2010
      - ${HLA2010_PITCH_HOME}/lib/prtifull.jar
    validate:
      - python3 scripts/ci/check_vendor_runtime_ci_state.py --profile matrix --json
      - ./tools/certi-easy preflight
      - ./tools/pitch preflight

  vendor-edge:
    description: Same dedicated runner contract as matrix.
    extends: matrix

  all:
    description: Vendor smoke runner with patched CERTI plus Pitch state.
    required_vars:
      - HLA2010_CERTI_PATCHED_PREFIX
      - HLA2010_CERTI_PATCHED_BUILD_ROOT
      - HLA2010_PITCH_HOME
      - HLA2010_PITCH_USER_HOME
    compatibility_vars:
      HLA2010_CERTI_PREFIX: HLA2010_CERTI_PATCHED_PREFIX
      HLA2010_CERTI_BUILD_ROOT: HLA2010_CERTI_PATCHED_BUILD_ROOT
    required_markers:
      - ${HLA2010_CERTI_PATCHED_PREFIX}/bin/rtig
      - ${HLA2010_CERTI_PATCHED_BUILD_ROOT}/libRTI/ieee1516-2010
      - ${HLA2010_PITCH_HOME}/lib/prtifull.jar
    validate:
      - python3 scripts/ci/check_vendor_runtime_ci_state.py --profile all --json
      - ./tools/certi-easy preflight
      - ./tools/pitch preflight
